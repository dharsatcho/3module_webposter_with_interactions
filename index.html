<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РќРђ РћР‘Р›РђРљР•</title>
    <link href="./stylesheets/style.css" rel="stylesheet" />
    <link rel="icon" href="" type="image/x-icon">
</head>
<body>
    <div class="container">
        <section class="first_section">
            <div class="first_section_second_sost">
                <button class="first_section_overlay_button">
                    <img src="images/button_2sost.svg" alt="">
                </button>
                <img src="images/sost_2.svg" alt="" class="moving-image ">
            </div>
                <div>
                    <img src="images/grad_1.svg" alt="" class="grad_first
                    ">
                    <img src="images/who_there.svg" alt="" class="who_there">
                </div>
        </section>

        <section class="create_character">
            <div class="character-container">
                <img src="images/cloud_decor_4.svg" alt="" class="clouds_decor_main_create_char">
                <img src="images/decor_clouds.svg" alt="" class="decor_clouds_create_char">
                <button class="again_button_create_char">
                    <img src="images/button_again.svg" alt="">
                </button>
                <button class="win_button_create_char">
                    <img src="images/button_confirmed.svg" alt="">
                </button>
                <img src="images/1_form_1_variant.svg" alt="" class="main-character-img">
                
                <div class="popup_create_char">
                    <div class="popup-content">
                        <h1>ТВОЙ ДРУГ <br>СОЗДАН!</h1>
                        <img src="images/popup_create_char_winn.svg" alt="" class="popup-img">
                        <div class="button_start_again_char">
                            <h3>НАЧАТЬ ЗАНОВО</h3>
                            <button class="again_popup_button_create_char">
                                <img src="images/button_again.svg" alt="">
                            </button>
                        </div>
                        
                        <button class="close_popup_button_create_char">
                            <img src="images/button_cancel.svg" alt="">
                        </button>
                    </div>

                </div>

                <div class="left_slider">
                    <H1>
                        СОЗДАЙ СВОЕ<br>ОБЛАКО!
                    </h1>

                    <div class="slider-option first_slider_option">
                        <img src="" alt="">
                        <button class="left-btn" data-slider="eyes">
                            <img src="images/left_switch.svg" alt="">
                        </button>
                    
                        <img src="images/eyes_first.svg" alt="" class="slider-img eyes-img">

                        <button class="right-btn" data-slider="eyes">
                            <img src="images/right_switch.svg" alt="">
                        </button>

                    </div>

                    <div class="slider-option second_slider_option">
                        <img src="" alt="">
                        <button class="left-btn" data-slider="form">
                            <img src="images/left_switch.svg" alt="">
                        </button>
                    
                        <img src="images/form_first.svg" alt="" class="slider-img form-img">

                        <button class="right-btn" data-slider="form">
                            <img src="images/right_switch.svg" alt="">
                        </button>
                    
                    </div>

                    <div class="slider-option third_slider_option">
                        <img src="" alt="">
                        <button class="left-btn" data-slider="body">
                            <img src="images/left_switch.svg" alt="">
                        </button>
                    
                        <img src="images/body_first.svg" alt="" class="slider-img body-img">

                        <button class="right-btn" data-slider="body">
                            <img src="images/right_switch.svg" alt="">
                        </button>
                    
                    </div>
                    <img src="images/Rectangle_slider.svg" alt="" class="slider_bg">
                </div>
            </div>
        </section> 

         <section class="scale_phrase_1">
            <div>
                <img src="images/letter_g.svg" alt="">
                <img src="images/letter_d.svg" alt="">
                <img src="images/letter_e.svg" alt="">
                <img src="images/letter_zh.svg" alt="">
                <img src="images/letter_e.svg" alt="">
                <img src="images/letter_t.svg" alt="">
                <img src="images/letter_v.svg" alt="">
                <img src="images/letter_o.svg" alt="">
                <img src="images/letter_io.svg" alt="">
                <img src="images/letter_d.svg" alt="">
                <img src="images/letter_r.svg" alt="">
                <img src="images/letter_y.svg" alt="">
                <img src="images/letter_g.svg" alt="">
                <img src="images/letter_questionmark.svg" alt="">
                <img src="images/letter_io.svg" alt="">
            </div>
        </section>

       <section class="searching_a_friend">
        <div class="popup_searching_a_friend" id="popupBg">
            <div class="popup-content">
                <h1>А ТЫ НЕПЛОХ<br>В ИГРАХ</h1>
                <img src="images/popup_create_char_winn.svg" alt="" class="popup-img">
                <div class="button_start_again_searching_a_friend">
                    <h3>НАЧАТЬ ЗАНОВО</h3>
                    <button class="again_popup_button_searching_a_friend">
                        <img src="images/button_again.svg" alt="">
                    </button>
                </div>
                <button class="close_popup_button_searching_a_friend">
                    <img src="images/button_cancel.svg" alt="">
                </button>
            </div>
        </div>
        <div class="phrase-container">

            <div class="phrase-card first_cloud_friend" data-id="1">
                    <img src="images/friend_cloud_1.svg" alt="" class="main-phrase">
                <div class="friend-cloud hidden">
                    <img src="images/phrase_first.svg" alt="friend">
                </div>
            </div>

                <div class="phrase-card second_cloud_friend" data-id="2">
                    <img src="images/friend_cloud_2.svg" alt="phrase" class="main-phrase ">
                    <div class="friend-cloud hidden">
                        <img src="images/phrase_second.svg" alt="friend">
                    </div>
                </div>

                <div class="phrase-card third_cloud_friend" data-id="3">
                    <img src="images/friend_cloud_3.svg" alt="phrase" class="main-phrase ">
                    <div class="friend-cloud hidden">
                        <img src="images/phrase_fourth.svg" alt="friend">
                    </div>
                </div>
                
                <div class="phrase-card fourth_cloud_friend" data-id="4">
                    <img src="images/friend_cloud_4.svg" alt="phrase" class="main-phrase ">
                    <div class="friend-cloud hidden">
                        <img src="images/phrase_third.svg" alt="friend">
                    </div>
                </div>
                
                <div class="phrase-card trigger-card main_cloud_friend">
                    <img src="images/cloud_fifth.svg" alt="trigger phrase" class="main-phrase">
                    <div class="friend-cloud hidden">
                        <img src="images/phrase_special.svg" alt="friend">
                    </div>
                </div>
            </div>
        </div>
       </section>

        <section class="game_stop">
            <div class="game_stop_inner">
                <div class="stop_sign">
                    <img src="images/sign_blank.svg" alt="" class="stop_sign_image">
                    <h1 class="stop_sign_title">СТОП!</h1>
                </div>
                <div class="traffic_lighter">
                    <img src="images/zvetofor_og.svg" alt="" class="traffic_lighter_image">
                    <div class="traffic_light_bulb traffic_light_bulb_red"></div>
                    <div class="traffic_light_bulb traffic_light_bulb_yellow"></div>
                    <div class="traffic_light_bulb traffic_light_bulb_green"></div>
                </div>
                <img src="images/decor_stop_game.svg" alt="" class="decor_game_stop">
            </div>
        </section>

        <section class="create_drink">
            <div class="create_drink_inner">
                <img src="images/grumpy_cloud.svg" alt="" class="grumpy_cloud">

                <div class="create_drink_text">
                    <img src="images/plachka_dialogue.svg" alt="" class="create_drink_text_bg">
                    <h1 class="create_drink_text_value" data-full-text="КАЖЕТСЯ, ТВОЙ ДРУГ УСТАЛ!"></h1>
                </div>

                <div class="drink">
                    <div class="drink_drop_zone" aria-label="Стакан для напитка"></div>
                    <img src="images/empty_glass.svg" alt="" class="empty_glass">
                    <img src="images/rack.svg" alt="" class="rack">
                </div>

                <div class="drink_options_area">
                    <div class="options_of_drink_base options_of_drink_base--first">
                        <div class="drink_option" draggable="true" data-drink-item="base_1">
                            <img src="images/base_1.svg" alt="" class="base_1_for_drink">
                        </div>
                        <div class="drink_option" draggable="true" data-drink-item="base_2">
                            <img src="images/base_2.svg" alt="" class="base_2_for_drink">
                        </div>
                        <img src="images/rack_base_drink.svg" alt="" class="rack_base_drink rack_base_drink_2">
                    </div>

                    <div class="options_of_drink_base options_of_drink_base--second">
                        <div class="drink_option" draggable="true" data-drink-item="bake_drink_1">
                            <img src="images/bake_drink_1-1.svg" alt="" class="decor_1_for_drink">
                        </div>
                        <div class="drink_option" draggable="true" data-drink-item="bake_drink_1_1">
                            <img src="images/bake_drink_1.svg" alt="" class="decor_2_for_drink">
                        </div>
                        <img src="images/rack_base_drink_1.svg" alt="" class="rack_base_drink rack_base_drink_1">
                    </div>

                    <img src="images/drag_sign.svg" alt="" class="drag_sign">
                </div>

                <div class="create_drink_actions">
                    <button class="again_button_create_drink" type="button">
                        <img src="images/button_again.svg" alt="">
                    </button>

                    <button class="done_button_create_drink" type="button">
                        <img src="images/button_confirmed.svg" alt="">
                    </button>
                </div>

                <div class="popup_create_char popup_create_drink_victory">
                    <div class="popup-content">
                        <h1>НУ ВООБЩЕ<br>БАЛДЕЖ</h1>
                        <img src="images/popup_create_char_winn.svg" alt="" class="popup-img">
                        <div class="button_start_again_char">
                            <h3>НАЧАТЬ ЗАНОВО</h3>
                            <button class="again_popup_button_create_drink_victory" type="button">
                                <img src="images/button_again.svg" alt="">
                            </button>
                        </div>

                        <button class="close_popup_button_create_drink_victory" type="button">
                            <img src="images/button_cancel.svg" alt="">
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="victorina">
            <div class="popup_victorina">
                <div class="popup-content">
                    <h1 class="popup_victorina_title"></h1>
                    <p class="popup_victorina_score"></p>
                    <img src="images/popup_create_char_winn.svg" alt="" class="popup-img">
                    <div class="button_start_again_victorina">
                        <h3>НАЧАТЬ ЗАНОВО</h3>
                        <button class="again_popup_button_victorina" type="button">
                            <img src="images/button_again.svg" alt="">
                        </button>
                    </div>
                    <button class="close_popup_button_victorina" type="button">
                        <img src="images/button_cancel.svg" alt="">
                    </button>
                </div>
            </div>

            <div class="victorina_inner">
                <img src="images/1_1_1_variant.svg" alt="" class="victorina_main_character">
                <div class="victorina_question_counter">
                    <img src="images/plaschka_pod_nomer.svg" alt="" class="victorina_question_counter_bg">
                    <span class="victorina_question_counter_value">1/3</span>
                </div>

                <button class="victorina_card victorina_card_question" type="button" data-role="question">
                    <img src="images/cloud_questionmark_4.svg" alt="" class="victorina_card_cloud cloud_questionmark_4">
                    <div class="victorina_card_plaque questionmark_4_cloud">
                        <img src="images/plaschka_pod_vopros.svg" alt="" class="victorina_card_plaque_image">
                        <h2 class="victorina_card_text">?</h2>
                    </div>
                </button>

                <button class="victorina_card victorina_card_answer victorina_card_answer_top" type="button" data-answer-index="0">
                    <img src="images/cloud_questionmark_1.svg" alt="" class="victorina_card_cloud cloud_questionmark_1">
                    <div class="victorina_card_plaque questionmark_1_cloud">
                        <img src="images/plashka_victorina.svg" alt="" class="victorina_card_plaque_image">
                        <h2 class="victorina_card_text">?</h2>
                    </div>
                </button>

                <button class="victorina_card victorina_card_answer victorina_card_answer_middle" type="button" data-answer-index="1">
                    <img src="images/cloud_questionmark_2.svg" alt="" class="victorina_card_cloud cloud_questionmark_2">
                    <div class="victorina_card_plaque">
                        <img src="images/plashka_victorina.svg" alt="" class="victorina_card_plaque_image">
                        <h2 class="victorina_card_text">?</h2>
                    </div>
                </button>

                <button class="victorina_card victorina_card_answer victorina_card_answer_bottom" type="button" data-answer-index="2">
                    <img src="images/cloud_questionmark_3.svg" alt="" class="victorina_card_cloud cloud_questionmark_3">
                    <div class="victorina_card_plaque">
                        <img src="images/plashka_victorina.svg" alt="" class="victorina_card_plaque_image">
                        <h2 class="victorina_card_text">?</h2>
                    </div>
                </button>
            </div>
        </section>

        <section class="scale_phrase_2">
                <div class="row_letter_scale_2">
                    <img src="images/2_scale_t.svg" alt="">
                    <img src="images/2_scale_e.svg" alt="">
                    <img src="images/2_scale_p.svg" alt="">
                    <img src="images/2_scale_e.svg" alt="">
                    <img src="images/2_scale_r.svg" alt="">
                    <img src="images/2_scale_znak.svg" alt="">
                    <img src="images/2_scale_v.svg" alt="">
                    <img src="images/2_scale_yi.svg" alt="">
                    <img src="images/2_scale_d.svg" alt="">
                    <img src="images/2_scale_r.svg" alt="">
                    <img src="images/2_scale_y.svg" alt="">
                    <img src="images/2_scale_z.svg" alt="">
                    <img src="images/2_scale_znak.svg" alt="">
                    <img src="images/2_scale_ia.svg" alt="">
                    <img src="images/2_scale_mark.svg" alt="">
                </div>
        </section>

        <section class="last_screen">
            <div class="cloud_with_phrase_last">
                <img src="" alt="">
                <p></p>
            </div>
            
            <div class="last_screen_restart">
                <!-- <p>ТЫ ПРОШЕЛ 5/5 ИГР</p> -->
                <button class="again_popup_last">
                    <img src="images/button_again.svg" alt="">
                </button>
            </div>
            <img src="images/cloud_lezhit.svg" alt="">
        </section>
        <section class="basement">
            <div>
                <p>Б25ДЗ11</p>
                <p>КУРАТОР: НИКОЛАЙ ЦВЕТНИКОВ</p>
                <p>РЯБОВА БОЖЕНА</p>
            </div>
            <img src="images/podval_cloud.svg" alt="">
        </section>
       
    </div>
    <script src="stylesheets/script.js"></script>
</body>
</html>
